scalar DateTime

type User {
  id: ID!
  name: String!
  email: String!
  createdAt: DateTime!
}

type AuthPayload {
  user: User!
}

input SignUpInput {
  name: String!
  email: String!
  password: String!
}

input SignInInput {
  email: String!
  password: String!
  rememberMe: Boolean
}

type Query {
  me: User!
}

input UpdateUserInput {
  name: String!
}

type Mutation {
  signUp(input: SignUpInput!): AuthPayload!
  signIn(input: SignInInput!): AuthPayload!
  signOut: Boolean!
  updateUser(input: UpdateUserInput!): User!
}

type Category {
  id: ID!
  title: String!
  description: String
  icon: String!
  color: String!
  transactionsCount: Int!
  totalAmount: Float!
  createdAt: DateTime!
}

input CategoryInput {
  title: String!
  description: String
  icon: String!
  color: String!
}

extend type Query {
  categories: [Category!]!
}

extend type Mutation {
  createCategory(input: CategoryInput!): Category!
  updateCategory(id: ID!, input: CategoryInput!): Category!
  deleteCategory(id: ID!): Boolean!
}

enum TransactionType {
  INCOME
  EXPENSE
}

type Transaction {
  id: ID!
  description: String!
  amount: Float!
  type: TransactionType!
  date: DateTime!
  category: Category!
  createdAt: DateTime!
}

input TransactionInput {
  description: String!
  amount: Float!
  type: TransactionType!
  date: DateTime!
  categoryId: ID!
}

type DashboardStats {
  totalBalance: Float!
  monthIncome: Float!
  monthExpense: Float!
  recentTransactions: [Transaction!]!
  categoriesSummary: [CategorySummary!]!
}

type CategorySummary {
  category: Category!
  count: Int!
  totalAmount: Float!
}

extend type Query {
  transactions(month: Int, year: Int): [Transaction!]!
  dashboard: DashboardStats!
}

extend type Mutation {
  createTransaction(input: TransactionInput!): Transaction!
  updateTransaction(id: ID!, input: TransactionInput!): Transaction!
  deleteTransaction(id: ID!): Boolean!
}
