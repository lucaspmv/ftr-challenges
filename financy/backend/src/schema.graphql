scalar DateTime

type User {
  id: ID!
  name: String!
  email: String!
  createdAt: DateTime!
}

type AuthPayload {
  user: User!
}

input SignUpInput {
  name: String!
  email: String!
  password: String!
}

input SignInInput {
  email: String!
  password: String!
  rememberMe: Boolean
}

type Query {
  me: User!
}

type Mutation {
  signUp(input: SignUpInput!): AuthPayload!
  signIn(input: SignInInput!): AuthPayload!
  signOut: Boolean!
}
