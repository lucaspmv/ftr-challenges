scalar DateTime

type User {
  id: ID!
  name: String!
  email: String!
  createdAt: DateTime!
}

type AuthPayload {
  user: User!
}

input SignUpInput {
  name: String!
  email: String!
  password: String!
}

input SignInInput {
  email: String!
  password: String!
  rememberMe: Boolean
}

type Query {
  me: User!
}

type Mutation {
  signUp(input: SignUpInput!): AuthPayload!
  signIn(input: SignInInput!): AuthPayload!
  signOut: Boolean!
}

type Category {
  id: ID!
  title: String!
  description: String
  icon: String!
  color: String!
  transactionsCount: Int!
  totalAmount: Float!
  createdAt: DateTime!
}

input CategoryInput {
  title: String!
  description: String
  icon: String!
  color: String!
}

extend type Query {
  categories: [Category!]!
}

extend type Mutation {
  createCategory(input: CategoryInput!): Category!
  updateCategory(id: ID!, input: CategoryInput!): Category!
  deleteCategory(id: ID!): Boolean!
}
